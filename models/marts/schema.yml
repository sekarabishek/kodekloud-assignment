version: 2

models:
  - name: dim_course
    description: Course dimension (SCD Type 1)
    columns:
      - name: course_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: course_name
        description: Natural key
        tests:
          - unique
          - not_null
      - name: course_type
        description: PAID or FREE
        tests:
          - accepted_values:
              values: ['PAID', 'FREE']
      - name: is_revenue_generating
        description: True for paid courses
        tests:
          - not_null

  - name: dim_customer
    description: Customer dimension (SCD Type 2 ready)
    columns:
      - name: customer_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key
        tests:
          - unique
          - not_null
      - name: is_current
        description: Current record flag
        tests:
          - not_null

  - name: fact_order
    description: Order fact table
    columns:
      - name: order_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: order_id
        description: Natural key
        tests:
          - unique
          - not_null
      - name: net_amount_usd
        description: Order amount in USD
        tests:
          - not_null
      - name: customer_key
        description: FK to dim_customer
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_key
              config:
                where: "customer_key is not null"

  - name: fact_consumption
    description: Consumption fact table
    columns:
      - name: consumption_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: customer_key
        description: FK to dim_customer
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: course_key
        description: FK to dim_course
        tests:
          - not_null
          - relationships:
              to: ref('dim_course')
              field: course_key
      - name: total_minutes_consumed
        description: Total watch time
        tests:
          - not_null

  - name: fact_revenue_attribution
    description: Revenue attribution fact table
    columns:
      - name: revenue_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: customer_key
        description: FK to dim_customer
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: course_key
        description: FK to dim_course
        tests:
          - not_null
          - relationships:
              to: ref('dim_course')
              field: course_key
      - name: attribution_percentage
        description: Must be between 0 and 1
        tests:
          - not_null
      - name: attributed_revenue
        description: Must be non-negative
        tests:
          - not_null
      - name: is_free_course
        description: Must always be false
        tests:
          - accepted_values:
              values: [false]
